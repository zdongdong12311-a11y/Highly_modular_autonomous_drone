# 机器人半径(米)，用于碰撞检测
robot_radius: 0.3

obstacle_layer:
  # 是否启用障碍物层
  enabled: true
  # 组合方式: 0=覆盖, 1=取最大值
  combination_method: 1
  # 是否跟踪未知空间
  track_unknown_space: true
  # 障碍物最小高度(米)，低于此高度的点云不标记为障碍物
  min_obstacle_height: -5
  # 障碍物最大高度(米)，高于此高度的点云不标记为障碍物
  max_obstacle_height: 10
  # 障碍物检测范围(米)，此范围内的传感器数据用于标记障碍物
  obstacle_range: 4
  # 射线追踪范围(米)，此范围内的传感器数据用于清除障碍物
  raytrace_range: 6
  # 观测数据源列表
  observation_sources: laser_scan_sensor
  laser_scan_sensor:
    # 数据类型: LaserScan / PointCloud / PointCloud2
    data_type: LaserScan
    # 传感器话题名称
    topic: scan
    # 是否使用此传感器数据标记障碍物
    marking: true
    # 是否使用此传感器数据清除障碍物
    clearing: true
    # 此传感器用于标记的最小障碍物高度(米)
    min_obstacle_height: -5
    # 此传感器用于标记的最大障碍物高度(米)
    max_obstacle_height: 10

inflation_layer:
  # 是否启用膨胀层(在障碍物周围生成膨胀区域)
  enabled: true
  # 代价缩放因子，值越大代价衰减越快（障碍物边缘的代价下降越快）
  cost_scaling_factor: 10.0
  # 膨胀半径(米)，障碍物周围膨胀的范围
  inflation_radius: 0.3

static_layer:
  # 是否启用静态地图层(从map_server加载静态地图)
  enabled: true
