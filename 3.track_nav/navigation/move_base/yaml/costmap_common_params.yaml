robot_radius: 0.3

obstacle_layer:
  enabled: true
  combination_method: 1
  track_unknown_space: true
  min_obstacle_height: -5
  max_obstacle_height: 10
  obstacle_range: 4
  raytrace_range: 6
  observation_sources: laser_scan_sensor
  laser_scan_sensor:
    data_type: LaserScan
    topic: scan
    marking: true
    clearing: true
    min_obstacle_height: -5
    max_obstacle_height: 10

inflation_layer:
  enabled: true
  cost_scaling_factor: 10.0
  inflation_radius: 0.3

static_layer:
  enabled: true
